<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ship Happens</title>
    <link rel="stylesheet" href="/src/styles/main.css" />
    <link rel="stylesheet" href="/src/styles/screens.css" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
      }
      canvas {
        display: block;
      }
    </style>
  </head>
  <body>
    <!-- Loading screen: visible immediately, removed by main.ts when game is ready -->
    <div id="loading-screen">
      <div class="loading-content">
        <h1 class="loading-title">Ship Happens</h1>
        <p class="loading-tagline">Preparing to set sail&hellip;</p>
        <div class="loading-spinner">
          <div class="spinner-wave">
            <span></span><span></span><span></span><span></span><span></span>
          </div>
        </div>
      </div>
    </div>
    <style>
      #loading-screen {
        position: fixed;
        inset: 0;
        z-index: 10000;
        display: flex;
        align-items: center;
        justify-content: center;
        background: radial-gradient(ellipse at center, #1a3a5c 0%, #1a1a2e 70%);
      }
      .loading-content {
        text-align: center;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 20px;
      }
      .loading-title {
        font-family: 'Playfair Display', Georgia, serif;
        font-size: 64px;
        font-weight: 900;
        color: #d4a844;
        text-shadow: 0 2px 8px rgba(0,0,0,0.6), 0 0 40px rgba(212,168,68,0.2);
        letter-spacing: 0.04em;
        animation: loadingPulse 2s ease-in-out infinite;
      }
      .loading-tagline {
        font-family: 'Inter', system-ui, sans-serif;
        font-size: 16px;
        color: #a8a4a0;
        font-style: italic;
        letter-spacing: 0.05em;
      }
      .spinner-wave {
        display: flex;
        gap: 4px;
        align-items: flex-end;
        height: 24px;
      }
      .spinner-wave span {
        display: block;
        width: 4px;
        height: 8px;
        background: #b87333;
        border-radius: 2px;
        animation: wave 1.2s ease-in-out infinite;
      }
      .spinner-wave span:nth-child(1) { animation-delay: 0s; }
      .spinner-wave span:nth-child(2) { animation-delay: 0.1s; }
      .spinner-wave span:nth-child(3) { animation-delay: 0.2s; }
      .spinner-wave span:nth-child(4) { animation-delay: 0.3s; }
      .spinner-wave span:nth-child(5) { animation-delay: 0.4s; }
      @keyframes wave {
        0%, 100% { height: 8px; opacity: 0.5; }
        50% { height: 24px; opacity: 1; }
      }
      @keyframes loadingPulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.7; }
      }
      #loading-screen.fade-out {
        animation: fadeOut 500ms ease-out forwards;
      }
      @keyframes fadeOut {
        from { opacity: 1; }
        to { opacity: 0; }
      }
    </style>

    <div id="ui-overlay"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
